<style>

<script>
const Q=[
{t:"Contrats de transport",q:"Le contrat type applicable aux transports publics routiers exécutés par des sous-traitants s'applique pour les relations entre :",o:["Un transporteur routier et un loueur de véhicules avec conducteur","Une entreprise de transport compte propre et un transporteur public routier","Un commissionnaire de transport et un transporteur public routier de marchandises","Un commissionnaire de transport et un loueur de véhicules avec conducteur"],a:0,e:"Le contrat type sous-traitance régit les relations entre un <strong>commissionnaire de transport et un transporteur public routier</strong>. Réponse officielle 2018 : A."},
{t:"Droit des affaires",q:"La demande d'ouverture de la procédure de redressement judiciaire est de la compétence :",o:["Exclusive du chef d'entreprise","Exclusive du chef d'entreprise et des créanciers","Exclusive du président du tribunal de commerce et des créanciers","Indifféremment du chef d'entreprise, des créanciers, des salariés, du président du tribunal, du procureur"],a:3,e:"Le redressement judiciaire peut être demandé par le <strong>débiteur, ses créanciers ou le procureur de la République</strong>. Ni les salariés ni le président du tribunal ne peuvent en faire la demande."},
{t:"Droit des affaires",q:"Le président d'une SAS :",o:["Est toujours une personne morale","Est obligatoirement un associé de la SAS","Est toujours désigné par un conseil d'administration","Peut être une personne physique ou morale"],a:3,e:"Le président d'une SAS peut être <strong>une personne physique ou morale, associée ou non</strong>. C'est l'une des grandes libertés statutaires de la SAS."},
{t:"Droit des affaires",q:"Dans une SARL, le gérant :",o:["N'a pas obligatoirement la qualité de commerçant","Doit obligatoirement être associé","Ne peut être salarié qu'à condition d'être actionnaire majoritaire","Devient automatiquement commerçant"],a:0,e:"Le gérant de SARL <strong>n'est pas commerçant</strong> — c'est la société qui l'est. Il n'est pas non plus obligatoirement associé."},
{t:"Droit des affaires",q:"Dans une SARL, les associés doivent répondre des dettes de la société :",o:["Dans leur totalité","Proportionnellement à leurs apports","Sauf en cas de liquidation judiciaire","Dans la limite de leurs apports"],a:3,e:"La responsabilité des associés d'une SARL est <strong>limitée à leurs apports</strong>. Leur patrimoine personnel est protégé."},
{t:"Droit des affaires",q:"La cessation de paiement d'une société commerciale est :",o:["L'impossibilité de faire face au passif exigible avec son actif disponible","La perte de la moitié de son capital social","Une infraction imputable aux dirigeants","La tenue d'une comptabilité irrégulière"],a:0,e:"La cessation de paiement = <strong>impossibilité de faire face au passif exigible avec l'actif disponible</strong> (art. L631-1 Code de commerce)."},
{t:"Droit des affaires",q:"Un chef d'entreprise désire avoir le statut de salarié, il doit :",o:["S'inscrire au RCS en nom personnel","Être le gérant associé d'une EURL","Être le gérant unique d'une SARL dont il aura la majorité du capital","Être le gérant unique d'une SARL dont il aura la minorité du capital"],a:3,e:"Le gérant <strong>minoritaire de SARL</strong> (moins de 50% des parts) bénéficie du statut de salarié. Le gérant majoritaire et le gérant d'EURL sont des TNS."},
{t:"Transport international (CMR)",q:"Lors d'un transport routier Paris-Rome, la marchandise est considérée comme perdue si elle n'a pas été livrée dans les :",o:["15 jours suivant l'expiration du délai convenu","30 jours suivant l'expiration du délai convenu","35 jours suivant l'expiration du délai convenu","60 jours suivant l'expiration du délai convenu"],a:1,e:"En CMR (art. 20), la marchandise est réputée perdue <strong>30 jours après l'expiration du délai convenu</strong>. Réponse officielle 2018 : B."},
{t:"Fiscalité",q:"L'entrepreneur individuel est imposé au titre :",o:["Des prélèvements effectués pour ses besoins personnels","De ses revenus (bénéfices industriels et commerciaux)","De l'impôt sur les sociétés","Des valeurs mobilières de placement"],a:1,e:"L'entrepreneur individuel est imposé à l'<strong>impôt sur le revenu dans la catégorie BIC</strong> (bénéfices industriels et commerciaux)."},
{t:"Transport national",q:"En transport national, un destinataire constate des avaries le jour de la livraison. La durée de prescription de son action est de :",o:["6 mois","1 an","2 ans","3 ans"],a:1,e:"En transport intérieur, la prescription est d'<strong>1 an</strong> à compter de la livraison (art. L133-6 Code de commerce)."},
{t:"Droit des affaires",q:"Dans une SARL, le gérant est élu à la majorité des associés :",o:["À l'unanimité","Représentant un quart des parts sociales","Représentant plus des trois quarts des parts sociales","Représentant plus de la moitié des parts sociales"],a:3,e:"Le gérant de SARL est nommé à la <strong>majorité absolue des parts sociales</strong> (plus de la moitié) — art. L223-29 Code de commerce."},
{t:"Droit des affaires",q:"Dans une EURL, le gérant associé unique est responsable :",o:["De la totalité des dettes sociales","Des dettes sociales sur ses biens personnels","Des dettes sociales à concurrence de ses apports","Des dettes sociales à concurrence de son chiffre d'affaires"],a:2,e:"L'EURL est une SARL à associé unique : la <strong>responsabilité est limitée aux apports</strong>. Le patrimoine personnel est protégé hors faute de gestion."},
{t:"Transport national",q:"En transport routier intérieur, le délai pour intenter une action récursoire :",o:["Est d'un mois à dater de la livraison","Est d'un mois à dater de l'action principale","S'ajoute au délai de prescription","Annule le délai de prescription"],a:1,e:"L'action récursoire doit être intentée dans <strong>un mois à dater de l'action principale</strong> (art. L133-6 al. 3 Code de commerce)."},
{t:"Gestion financière",q:"Les entretiens et réparations du matériel de bureau entrent dans les charges :",o:["Variables au kilomètre","Variables annuelles","Fixes du véhicule","De structure"],a:3,e:"Le matériel de bureau n'est pas lié aux véhicules. Son entretien constitue une <strong>charge de structure</strong> (frais généraux de l'entreprise)."},
{t:"Gestion financière",q:"Une provision pour grosses réparations sera inscrite au bilan dans les :",o:["Dotations aux amortissements et aux provisions exceptionnelles","Amortissements et provisions","Provisions pour risques et charges","Réserves réglementées"],a:2,e:"Les provisions pour grosses réparations figurent en <strong>provisions pour risques et charges</strong> au passif du bilan (compte 157 du PCG)."},
{t:"Gestion financière",q:"Sont amortissables fiscalement en dégressif, entre autres :",o:["Les frais d'établissement","Certains matériels de transport acquis neufs","Les matériels de transport acquis d'occasion","Les immeubles et constructions"],a:1,e:"L'amortissement dégressif s'applique aux <strong>matériels et outillages neufs</strong> (dont certains véhicules neufs). Les biens d'occasion, frais d'établissement et immeubles ne sont pas éligibles."},
{t:"Réglementation transport",q:"La FIMO (formation initiale minimale obligatoire) est une formation :",o:["Non renouvelable et acquise une fois pour toutes","Renouvelable tous les 3 ans","Renouvelable tous les 5 ans","Non renouvelable en cas de suspension du permis"],a:0,e:"La FIMO est obtenue <strong>une seule fois</strong>. Elle doit être maintenue par la FCO (Formation Continue Obligatoire) tous les 5 ans. Réponse officielle 2018 : A."},
{t:"Droit social",q:"Le règlement intérieur de l'entreprise contient des dispositions relatives notamment :",o:["À la fixation de la durée du travail","Au respect des consignes en cas d'incendie","Aux dates de fermeture pour congés payés","Au paiement des salaires"],a:1,e:"Le règlement intérieur traite obligatoirement des <strong>règles d'hygiène, de sécurité et de discipline</strong>, dont les consignes incendie. La durée du travail et les salaires n'en font pas partie."},
{t:"RSE / Temps de conduite",q:"Selon le règlement (CE) n° 561/2006, le repos hebdomadaire doit être pris après au maximum :",o:["4 périodes de 24h","5 périodes de 24h","6 périodes de 24h","7 périodes de 24h"],a:2,e:"Selon l'art. 8§2 du règlement 561/2006, le repos hebdomadaire doit être pris après <strong>au plus 6 périodes de 24 heures</strong> à compter du repos hebdomadaire précédent."},
{t:"Droit social",q:"Les salariés sont informés de la convention collective applicable par une mention :",o:["Déposée en mairie","Affichée au conseil de prud'hommes","Figurant sur le bulletin de paie","Affichée au tribunal de commerce"],a:2,e:"La convention collective applicable doit être <strong>mentionnée sur le bulletin de paie</strong> (art. R3243-1 Code du travail)."},
{t:"Droit social",q:"Selon la CCNTR, le conducteur qui souhaite démissionner doit à son employeur un préavis de :",o:["1 semaine","2 semaines","1 mois","2 mois"],a:0,e:"Selon l'annexe 1 de la CCNTR, le préavis de démission d'un conducteur est d'<strong>1 mois</strong>. Réponse officielle 2018 : A."},
{t:"Droit social",q:"Un examen médical de reprise doit être organisé pour un salarié victime d'un AT ayant occasionné un arrêt d'au moins :",o:["8 jours","10 jours","21 jours","30 jours"],a:3,e:"Selon le corrigé officiel 2018 : <strong>D (30 jours)</strong>. La visite de reprise est obligatoire après un arrêt AT d'au moins 30 jours."},
{t:"Droit social",q:"En l'absence de représentant du personnel, lors de l'entretien préalable au licenciement, le salarié peut se faire assister par :",o:["Un avocat","Un inspecteur du travail","Un conseiller du salarié inscrit sur une liste officielle","Un conseiller prud'homal"],a:2,e:"En l'absence de représentants du personnel, l'assistance est assurée par un <strong>conseiller du salarié inscrit sur une liste officielle dressée par le préfet</strong> (art. L1232-4 Code du travail)."},
{t:"Droit social",q:"Selon la CCNTR, la durée maximale de la période d'essai non renouvelable d'un conducteur routier en CDI est de :",o:["Une semaine","Quinze jours","Un mois","Deux mois"],a:2,e:"Selon la CCNTR (annexe 1), la période d'essai d'un conducteur embauché en CDI est d'<strong>1 mois maximum, non renouvelable</strong>."},
{t:"Droit social",q:"Sauf danger immédiat, une inaptitude définitive au poste de travail est reconnue :",o:["Par le médecin traitant après un examen médical","Par le médecin du travail après au moins un examen médical et une étude du poste","Par le médecin du travail après deux examens médicaux","Par l'employeur après avis du médecin du travail et des délégués"],a:1,e:"L'inaptitude est prononcée par le <strong>médecin du travail</strong>, après au moins un examen médical et une étude du poste (loi Travail 2017 — un seul examen peut suffire)."},
{t:"Droit social",q:"À l'occasion d'événements familiaux, l'autorisation d'absence du salarié :",o:["N'est, en aucun cas, rémunérée","N'entraîne pas de réduction de la rémunération","S'impute sur le repos compensateur pour heures supplémentaires","N'est pas assimilée à des jours de travail effectif"],a:1,e:"Les congés pour événements familiaux sont <strong>rémunérés et n'entraînent pas de réduction de la rémunération</strong> (art. L3142-4 Code du travail)."},
{t:"Sécurité / Réglementation",q:"Dans une opération de transport, le protocole de sécurité, lorsqu'il est obligatoire :",o:["Doit être établi par l'expéditeur concernant les marchandises","Doit être établi entre le transporteur et l'entreprise d'accueil pour le chargement/déchargement","Doit être établi à l'initiative du transporteur","N'est utilisé que dans les entreprises certifiées ISO 9001"],a:1,e:"Le protocole de sécurité est établi entre <strong>l'entreprise d'accueil et le transporteur</strong> pour encadrer les opérations de chargement/déchargement (décret du 26 avril 1996)."},
{t:"Droit social",q:"Un employeur qui fait une avance sur salaire ne peut se rembourser qu'au moyen de retenues ne dépassant pas :",o:["Un vingtième du montant du salaire exigible","Un dixième du montant du salaire exigible","Un cinquième du montant du salaire exigible","La moitié du montant du salaire exigible"],a:1,e:"Les retenues pour remboursement d'avance sur salaire sont limitées à <strong>1/10e du salaire mensuel net</strong> (art. L3251-3 Code du travail)."},
{t:"Droit social",q:"La 44ème heure de travail hebdomadaire pour un conducteur routier de marchandises est majorée de :",o:["25%","33%","50%","75%"],a:2,e:"Selon l'art. R3312-47 du Code des transports, les heures au-delà de la 43ème heure sont majorées de <strong>50%</strong>."},
{t:"Contrats de transport",q:"Lors d'une opération d'affrètement en transport intérieur, le commissionnaire doit :",o:["Établir seulement une lettre de voiture","Établir seulement un bordereau de groupage","Établir une lettre de voiture et un bordereau de groupage","Enregistrer ses opérations d'affrètement sur un registre"],a:3,e:"En cas d'affrètement, le commissionnaire doit <strong>enregistrer ses opérations sur un registre d'affrètement</strong> (art. L3224-1 Code des transports)."},
{t:"Responsabilité",q:"Toute prestation annexe non prévue au contrat qui cause un dommage engage :",o:["La responsabilité du transporteur","La responsabilité de l'entreprise bénéficiaire","La responsabilité du commissionnaire","La responsabilité du conducteur"],a:1,e:"Selon l'art. L3222-6 du Code des transports, les prestations annexes non contractuelles engagent la <strong>responsabilité de l'entreprise bénéficiaire</strong>."},
{t:"Responsabilité",q:"Pour recourir à une expertise (art. L133-4 C. commerce) suite à un dommage à la marchandise :",o:["Vous faites établir un constat par un huissier","Vous présentez une requête au tribunal de commerce","Vous demandez à l'expert de votre assureur","Vous faites appel à un expert indépendant"],a:1,e:"L'expertise contradictoire (art. L133-4) est effectuée par un <strong>expert désigné par le président du tribunal de commerce</strong>, sur requête de la partie la plus diligente. Réponse officielle 2018 : B."},
{t:"Contrats de transport",q:"Selon le contrat type 'général', les opérations de chargement sont à la charge du donneur d'ordre :",o:["Quel que soit le tonnage","Quel que soit le volume","Pour les envois égaux ou supérieurs à 3 tonnes","Pour les envois inférieurs à 3 tonnes"],a:2,e:"Pour les envois <strong>≥ 3 tonnes</strong>, le chargement incombe au <strong>donneur d'ordre</strong>. Pour les envois < 3 tonnes, c'est le transporteur."},
{t:"Contrats de transport",q:"Pour un envoi de 20 t, le contrat type 'général' prévoit un délai de chargement (plage horaire respectée) de :",o:["1 heure","2 heures","3 heures","4 heures"],a:1,e:"Pour un envoi ≥ 10 tonnes avec plage horaire respectée, le délai de chargement est de <strong>2 heures</strong> selon le contrat type général. Réponse officielle 2018 : B."},
{t:"Réglementation transport",q:"L'immobilisation du véhicule peut être prononcée lors d'un contrôle si le conducteur :",o:["Ne peut présenter de titre de transport","N'a pas manipulé le sélecteur d'enregistrement du tachygraphe","Ne peut présenter son permis et le certificat d'immatriculation","A dépassé la vitesse autorisée de plus de 20%"],a:3,e:"L'immobilisation est prononcée quand le document de suivi est absent ET que le conducteur <strong>ne peut présenter le titre de transport</strong>. Réponse officielle 2018 : D."},
{t:"Réglementation transport",q:"Les documents de transport (arrêté du 9 novembre 1999) doivent être conservés pendant :",o:["1 an","2 ans","5 ans","10 ans"],a:1,e:"Selon le corrigé officiel 2018 : <strong>B (2 ans)</strong>. Les documents de transport et de location doivent être conservés 2 ans par l'entreprise."},
{t:"Gestion financière",q:"Le fait de convenir d'un délai de paiement supérieur à 30 jours peut générer :",o:["Une amende administrative d'un montant maximum de 75 000 € pour une personne physique","Une contravention","Aucune pénalité","Une amende délictuelle de 40 000 €"],a:0,e:"Le dépassement des délais légaux de paiement est sanctionné par une <strong>amende administrative pouvant atteindre 75 000 € pour une personne physique</strong> (art. L441-6 Code de commerce)."},
{t:"Gestion financière",q:"Le prix d'un transport public routier de marchandises :",o:["Est fixe et ne peut pas être modifié pendant l'exécution","Peut être modifié par l'une ou l'autre des parties en cas de variation du carburant","Est modifié de plein droit en cas de variation du carburant","Est modifié de plein droit en cas de variation des charges salariales"],a:2,e:"La clause de révision carburant (gazole) s'applique <strong>de plein droit</strong> selon l'art. L3222-7 du Code des transports, en référence à l'indice CNR. Réponse officielle 2018 : C."},
{t:"Contrats de transport",q:"Le contrat de transport routier est formé lorsque :",o:["Les parties sont d'accord sur la nature et le prix, même par téléphone","Les parties ont obligatoirement établi un écrit","Le transport a effectivement commencé","Le document de transport a été émargé par l'expéditeur et le transporteur"],a:0,e:"Le contrat de transport est <strong>consensuel</strong> : il est formé dès l'accord des parties sur la nature et le prix, même verbalement. L'écrit n'est pas requis pour sa validité."},
{t:"Contrats de transport",q:"Selon le contrat type 'général', le délai d'acheminement comprend :",o:["Le délai d'enlèvement et le délai de transport","Le délai de transport et le délai de livraison à domicile","Le délai de transport et le délai de livraison au quai de dégroupage","Le délai d'enlèvement, le délai de transport et le délai de livraison à domicile"],a:1,e:"Le délai d'acheminement selon le contrat type général comprend : <strong>délai de transport + délai de livraison à domicile</strong>. Réponse officielle 2018 : B."},
{t:"Réglementation transport",q:"La location d'un véhicule industriel avec ou sans conducteur donne lieu à l'établissement :",o:["D'une lettre de voiture","D'un bon de livraison","D'une feuille de location ou du contrat de location","D'une lettre de voiture et d'une feuille de location"],a:2,e:"La location de véhicule industriel donne lieu à l'établissement d'une <strong>feuille de location ou d'un contrat de location</strong> (arrêté du 9 novembre 1999)."},
{t:"Transport national",q:"En transport national, l'action en recouvrement du prix de transport est prescrite dans le délai de :",o:["1 an","3 ans","5 ans","10 ans"],a:0,e:"L'action en recouvrement du prix de transport se prescrit par <strong>1 an</strong> à compter de la livraison (art. L133-6 Code de commerce). Réponse officielle 2018 : A."},
{t:"Sécurité / Véhicules",q:"La longueur maximale d'un train routier ne doit pas excéder :",o:["16,50 m","18 m","18,75 m","20 m"],a:2,e:"La longueur maximale d'un <strong>train routier</strong> est de <strong>18,75 m</strong> (art. R312-5 Code de la route)."},

{t:"Sécurité / Véhicules",q:"Les restrictions de circulation en fin de semaine ou jours fériés concernent les véhicules dont le PTAC excède :",o:["3,5 T","6 T","7,5 T","10 T"],a:2,e:"Les restrictions de circulation week-end et jours fériés s'appliquent aux véhicules dont le PTAC est <strong>supérieur à 7,5 tonnes</strong>. Réponse officielle 2018 : C."},

{t:"Marchandises dangereuses",q:"En matières dangereuses, la pose des étiquettes sur les colis est de la responsabilité :",o:["De l'expéditeur","Du transporteur","Du chargeur","Du destinataire"],a:0,e:"Selon l'<strong>ADR</strong>, l'étiquetage des colis de matières dangereuses est de la responsabilité de <strong>l'expéditeur</strong>. C'est lui qui prépare et étiquette les colis avant remise au transporteur."},
{t:"Transport international",q:"Suite à un transport France-Allemagne, un trafic intérieur allemand vous est proposé. Vous pouvez l'effectuer à l'aide d'une :",o:["Autorisation de cabotage délivrée par la France","Autorisation de cabotage délivrée par l'Allemagne","Autorisation CEMT","Copie certifiée conforme de votre licence communautaire"],a:3,e:"Le cabotage dans l'UE s'effectue sur présentation de la <strong>copie certifiée conforme de la licence communautaire</strong> (règlement CE 1072/2009)."},
{t:"Transport international (CMR)",q:"En CMR, en cas de dommage, l'indemnité est calculée d'après la valeur de la marchandise :",o:["À la date de livraison","À la date de la prise en charge","À la date d'établissement de la réclamation","À la date de réception de la réclamation"],a:1,e:"Selon l'<strong>art. 23 CMR</strong>, l'indemnité est calculée d'après la valeur de la marchandise <strong>au lieu et au moment de la prise en charge</strong>."},
{t:"Transport international (CMR)",q:"En CMR, en cas de dommages à la marchandise, le destinataire doit faire des réserves :",o:["À la livraison en cas de dommages apparents","Dans un délai de 7 jours en cas de dommages apparents","À la livraison en cas de dommages non apparents","Dans un délai de 3 jours en cas de dommages non apparents"],a:0,e:"En CMR (art. 30) : <strong>réserves pour dommages apparents à la livraison</strong>. Pour les dommages non apparents : dans les 7 jours calendaires suivant la livraison."}
];

const ANSWERS=[2,3,3,0,3,0,3,1,1,1,3,2,1,3,2,1,0,1,2,2,0,3,2,2,1,1,1,1,2,3,1,1,2,1,3,1,0,2,0,1,2,0,2,1,2,3,0,3,1,0];

let cur=0,ans=new Array(50).fill(-1),locked=new Array(50).fill(false);

function render(){
  const q=Q[cur];
  document.getElementById("pfill").style.width=Math.round((cur+1)/50*100)+"%";
  document.getElementById("qtop").textContent="Question "+(cur+1)+" sur 50";
  document.getElementById("answered").textContent=locked.filter(Boolean).length+" répondues";
  document.getElementById("qcount").textContent=(cur+1)+" / 50";
  document.getElementById("bprev").disabled=cur===0;
  const nb=document.getElementById("bnext");
  if(cur===49&&locked[cur]){nb.textContent="Voir les résultats";nb.onclick=showResult;}
  else{nb.textContent="Suivant →";nb.onclick=()=>go(1);}
  nb.disabled=!locked[cur]&&ans[cur]===-1;
  const L=["a","b","c","d"];
  let h=`<div class="qcard"><div class="qcard-head"><span class="qnum">Q${cur+1}</span></div><div class="qtext">${q.q}</div><div class="options">`;
  q.o.forEach((o,i)=>{
    let c="opt";
    if(locked[cur]){c+=" locked";if(i===ANSWERS[cur])c+=" correct";else if(i===ans[cur]&&ans[cur]!==ANSWERS[cur])c+=" wrong";}
    else if(i===ans[cur])c+=" selected";
    h+=`<div class="${c}" onclick="pick(${i})"><div class="opt-letter">${L[i]}</div><div class="opt-text">${o}</div></div>`;
  });
  h+=`</div>`;
  if(locked[cur])h+=`<div class="expl">${q.e}</div>`;
  h+=`</div>`;
  document.getElementById("qzone").innerHTML=h;
  updateScore();
}
function pick(i){
  if(locked[cur])return;
  ans[cur]=i;locked[cur]=true;render();
  const nb=document.getElementById("bnext");nb.disabled=false;
  if(cur===49){nb.textContent="Voir les résultats";nb.onclick=showResult;}
}
function go(d){if(cur+d<0||cur+d>=50)return;cur+=d;render();}
function updateScore(){
  let ok=0;for(let i=0;i<50;i++)if(locked[i]&&ans[i]===ANSWERS[i])ok++;
  document.getElementById("score").textContent=ok*2;
}
function showResult(){
  let ok=0;for(let i=0;i<50;i++)if(ans[i]===ANSWERS[i])ok++;
  const ko=50-ok,pts=ok*2,pct=Math.round(ok/50*100);
  const themes=[...new Set(Q.map(q=>q.t))];
  let tS={};themes.forEach(t=>{tS[t]={ok:0,total:0}});
  Q.forEach((q,i)=>{tS[q.t].total++;if(ans[i]===ANSWERS[i])tS[q.t].ok++;});
  let bHTML=themes.map(t=>{
    const s=tS[t],p=Math.round(s.ok/s.total*100);
    const c=p>=70?"#1A5C38":p>=50?"#F0B429":"#E24B4A";
    return `<div class="th-row"><div class="th-name">${t}</div><div class="th-bar-wrap"><div class="th-bar" style="width:${p}%;background:${c}"></div></div><div class="th-score">${s.ok}/${s.total}</div></div>`;
  }).join("");
  const msg=pts>=60?"Bonne préparation, continue !":pts>=40?"Des points à consolider.":"À retravailler — revois les chapitres en rouge.";
  document.getElementById("qzone").innerHTML="";
  document.getElementById("result").innerHTML=`
    <div class="result-pct">${pct}%</div>
    <div class="result-msg">${msg}</div>
    <div class="result-grid">
      <div class="rstat ok"><div class="rv">${ok}</div><div class="rl">Correctes</div></div>
      <div class="rstat ko"><div class="rv">${ko}</div><div class="rl">Incorrectes</div></div>
      <div class="rstat"><div class="rv">${pts}/100</div><div class="rl">Score</div></div>
    </div>
    <div class="breakdown"><h3>Résultats par thème</h3>${bHTML}</div>
    <button class="btn primary" onclick="restart()" style="width:100%">Recommencer</button>`;
  document.getElementById("result").style.display="block";
  document.getElementById("nav").style.display="none";
  document.querySelector(".progress-wrap").style.display="none";
}
function restart(){
  cur=0;ans=new Array(50).fill(-1);locked=new Array(50).fill(false);
  document.getElementById("result").style.display="none";
  document.getElementById("nav").style.display="flex";
  document.querySelector(".progress-wrap").style.display="block";
  document.getElementById("score").textContent="0";
  render();
}
render();
</script>
</body>
</html>
